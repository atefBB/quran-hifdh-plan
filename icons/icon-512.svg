<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3320"/>
      <stop offset="100%" stop-color="#1a5c3a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c97a"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#faf6ed"/>
      <stop offset="100%" stop-color="#f0e8d0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#gold)" stroke-width="6"/>
  <!-- Open book -->
  <g transform="translate(72, 140)">
    <!-- Left page -->
    <path d="M184 0 Q92 12 0 24 L0 196 Q92 180 184 168 Z" fill="url(#page)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M184 0 Q276 12 368 24 L368 196 Q276 180 184 168 Z" fill="url(#page)" opacity="0.95"/>
    <!-- Spine -->
    <rect x="174" y="4" width="20" height="164" rx="4" fill="url(#gold)"/>
    <!-- Text lines left -->
    <g fill="#8a6a1f" opacity="0.4">
      <rect x="30" y="48" width="130" height="5" rx="2"/>
      <rect x="38" y="68" width="114" height="5" rx="2"/>
      <rect x="30" y="88" width="130" height="5" rx="2"/>
      <rect x="40" y="108" width="100" height="5" rx="2"/>
      <rect x="34" y="128" width="122" height="5" rx="2"/>
      <rect x="36" y="148" width="118" height="5" rx="2"/>
    </g>
    <!-- Text lines right -->
    <g fill="#8a6a1f" opacity="0.4">
      <rect x="238" y="48" width="130" height="5" rx="2"/>
      <rect x="246" y="68" width="114" height="5" rx="2"/>
      <rect x="238" y="88" width="130" height="5" rx="2"/>
      <rect x="248" y="108" width="100" height="5" rx="2"/>
      <rect x="242" y="128" width="122" height="5" rx="2"/>
      <rect x="244" y="148" width="118" height="5" rx="2"/>
    </g>
    <!-- Bookmark -->
    <path d="M174 8 L184 30 L194 8" fill="url(#gold)"/>
  </g>
  <!-- Crescent moon -->
  <g transform="translate(350, 90)">
    <circle cx="0" cy="0" r="42" fill="url(#gold)"/>
    <circle cx="16" cy="-10" r="34" fill="url(#bg)"/>
  </g>
  <!-- Stars -->
  <circle cx="368" cy="66" r="5" fill="#e8c97a" opacity="0.7"/>
  <circle cx="390" cy="96" r="4" fill="#e8c97a" opacity="0.5"/>
  <circle cx="360" cy="110" r="3" fill="#e8c97a" opacity="0.4"/>
</svg>
